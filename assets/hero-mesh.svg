<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 320" preserveAspectRatio="xMidYMid meet">
  <style>
    .mesh-joint {
      opacity: 0.15;
      animation: jointPulse 3s ease-out infinite;
    }
    @keyframes jointPulse {
      0%, 100% { opacity: 0.15; }
      12% { opacity: 1; }
      35% { opacity: 0.15; }
    }
  </style>
  <defs>
    <filter id="meshGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Vertical dotted lines -->
  <line x1="40" y1="40" x2="40" y2="280" stroke="#ef5350" stroke-width="0.8" stroke-dasharray="2 6" opacity="0.25"/>
  <line x1="150" y1="40" x2="150" y2="280" stroke="#ef5350" stroke-width="0.8" stroke-dasharray="2 6" opacity="0.25"/>
  <line x1="260" y1="40" x2="260" y2="280" stroke="#ef5350" stroke-width="0.8" stroke-dasharray="2 6" opacity="0.25"/>
  <line x1="280" y1="40" x2="280" y2="280" stroke="#ef5350" stroke-width="0.8" stroke-dasharray="2 6" opacity="0.35"/>
  <line x1="300" y1="40" x2="300" y2="280" stroke="#ef5350" stroke-width="0.8" stroke-dasharray="2 6" opacity="0.25"/>
  <line x1="410" y1="40" x2="410" y2="280" stroke="#ef5350" stroke-width="0.8" stroke-dasharray="2 6" opacity="0.25"/>
  <line x1="520" y1="40" x2="520" y2="280" stroke="#ef5350" stroke-width="0.8" stroke-dasharray="2 6" opacity="0.25"/>

  <!-- Horizontal dotted lines -->
  <line x1="40" y1="40" x2="520" y2="40" stroke="#ef5350" stroke-width="0.8" stroke-dasharray="2 6" opacity="0.25"/>
  <line x1="40" y1="100" x2="520" y2="100" stroke="#ef5350" stroke-width="0.8" stroke-dasharray="2 6" opacity="0.25"/>
  <line x1="40" y1="160" x2="520" y2="160" stroke="#ef5350" stroke-width="0.8" stroke-dasharray="2 6" opacity="0.35"/>
  <line x1="40" y1="220" x2="520" y2="220" stroke="#ef5350" stroke-width="0.8" stroke-dasharray="2 6" opacity="0.25"/>
  <line x1="40" y1="280" x2="520" y2="280" stroke="#ef5350" stroke-width="0.8" stroke-dasharray="2 6" opacity="0.25"/>

  <!-- Center core -->
  <circle cx="280" cy="160" r="3" fill="#ef5350" filter="url(#meshGlow)">
    <animate attributeName="r" values="3;5;3" dur="1.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="1;0.5;1" dur="1.5s" repeatCount="indefinite"/>
  </circle>

  <!-- Joints row 1 (y=40) -->
  <circle cx="40"  cy="40" r="2.5" fill="#ef5350" class="mesh-joint" style="animation-delay:2.31s"/>
  <circle cx="150" cy="40" r="2.5" fill="#ef5350" class="mesh-joint" style="animation-delay:1.52s"/>
  <circle cx="260" cy="40" r="2.5" fill="#ef5350" class="mesh-joint" style="animation-delay:1.05s"/>
  <circle cx="280" cy="40" r="2.5" fill="#ef5350" class="mesh-joint" style="animation-delay:1.03s"/>
  <circle cx="300" cy="40" r="2.5" fill="#ef5350" class="mesh-joint" style="animation-delay:1.05s"/>
  <circle cx="410" cy="40" r="2.5" fill="#ef5350" class="mesh-joint" style="animation-delay:1.52s"/>
  <circle cx="520" cy="40" r="2.5" fill="#ef5350" class="mesh-joint" style="animation-delay:2.31s"/>

  <!-- Joints row 2 (y=100) -->
  <circle cx="40"  cy="100" r="2.5" fill="#ef5350" class="mesh-joint" style="animation-delay:2.13s"/>
  <circle cx="150" cy="100" r="2.5" fill="#ef5350" class="mesh-joint" style="animation-delay:1.23s"/>
  <circle cx="260" cy="100" r="2.5" fill="#ef5350" class="mesh-joint" style="animation-delay:0.54s"/>
  <circle cx="280" cy="100" r="2.5" fill="#ef5350" class="mesh-joint" style="animation-delay:0.52s"/>
  <circle cx="300" cy="100" r="2.5" fill="#ef5350" class="mesh-joint" style="animation-delay:0.54s"/>
  <circle cx="410" cy="100" r="2.5" fill="#ef5350" class="mesh-joint" style="animation-delay:1.23s"/>
  <circle cx="520" cy="100" r="2.5" fill="#ef5350" class="mesh-joint" style="animation-delay:2.13s"/>

  <!-- Joints row 3 (y=160) -->
  <circle cx="40"  cy="160" r="2.5" fill="#ef5350" class="mesh-joint" style="animation-delay:2.07s"/>
  <circle cx="150" cy="160" r="2.5" fill="#ef5350" class="mesh-joint" style="animation-delay:1.12s"/>
  <circle cx="260" cy="160" r="2.5" fill="#ef5350" class="mesh-joint" style="animation-delay:0.17s"/>
  <circle cx="280" cy="160" r="4" fill="#fff" class="mesh-joint" style="animation-delay:0s"/>
  <circle cx="300" cy="160" r="2.5" fill="#ef5350" class="mesh-joint" style="animation-delay:0.17s"/>
  <circle cx="410" cy="160" r="2.5" fill="#ef5350" class="mesh-joint" style="animation-delay:1.12s"/>
  <circle cx="520" cy="160" r="2.5" fill="#ef5350" class="mesh-joint" style="animation-delay:2.07s"/>

  <!-- Joints row 4 (y=220) -->
  <circle cx="40"  cy="220" r="2.5" fill="#ef5350" class="mesh-joint" style="animation-delay:2.13s"/>
  <circle cx="150" cy="220" r="2.5" fill="#ef5350" class="mesh-joint" style="animation-delay:1.23s"/>
  <circle cx="260" cy="220" r="2.5" fill="#ef5350" class="mesh-joint" style="animation-delay:0.54s"/>
  <circle cx="280" cy="220" r="2.5" fill="#ef5350" class="mesh-joint" style="animation-delay:0.52s"/>
  <circle cx="300" cy="220" r="2.5" fill="#ef5350" class="mesh-joint" style="animation-delay:0.54s"/>
  <circle cx="410" cy="220" r="2.5" fill="#ef5350" class="mesh-joint" style="animation-delay:1.23s"/>
  <circle cx="520" cy="220" r="2.5" fill="#ef5350" class="mesh-joint" style="animation-delay:2.13s"/>

  <!-- Joints row 5 (y=280) -->
  <circle cx="40"  cy="280" r="2.5" fill="#ef5350" class="mesh-joint" style="animation-delay:2.31s"/>
  <circle cx="150" cy="280" r="2.5" fill="#ef5350" class="mesh-joint" style="animation-delay:1.52s"/>
  <circle cx="260" cy="280" r="2.5" fill="#ef5350" class="mesh-joint" style="animation-delay:1.05s"/>
  <circle cx="280" cy="280" r="2.5" fill="#ef5350" class="mesh-joint" style="animation-delay:1.03s"/>
  <circle cx="300" cy="280" r="2.5" fill="#ef5350" class="mesh-joint" style="animation-delay:1.05s"/>
  <circle cx="410" cy="280" r="2.5" fill="#ef5350" class="mesh-joint" style="animation-delay:1.52s"/>
  <circle cx="520" cy="280" r="2.5" fill="#ef5350" class="mesh-joint" style="animation-delay:2.31s"/>
</svg>
